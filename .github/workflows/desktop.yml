# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Desktop installers

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  installer:
    name: Installer · ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            platform: macos
            artifact: macOS-Installer
            installer: dist/*.dmg
          - name: Windows x64
            os: windows-latest
            platform: windows
            artifact: Windows-x64-Installer
            installer: dist/*-Setup.exe
          - name: Linux x86-64
            os: ubuntu-latest
            platform: linux
            artifact: Linux-x86_64-AppImage
            installer: dist/*.AppImage
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Install uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install desktop build environment
        run: uv sync --locked --extra desktop --extra build
      - name: Install FFmpeg build prerequisites (macOS)
        if: matrix.platform == 'macos'
        run: brew install gnupg cmake
      - name: Install FFmpeg build prerequisites (Linux)
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential zlib1g-dev gnupg cmake ninja-build libvulkan-dev glslc
      - name: Install local-AI build prerequisites (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: choco install vulkan-sdk -y --no-progress
      - name: Install FFmpeg build prerequisites (Windows)
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            gnupg
            make
            diffutils
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-zlib
      - name: Cache verified FFmpeg runtime
        uses: actions/cache@v4
        with:
          path: build/ffmpeg/ffmpeg-*
          key: ffmpeg-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('packaging/ffmpeg/manifest.json') }}
      - name: Cache verified llama.cpp runtime
        uses: actions/cache@v4
        with:
          path: build/llama/llama-*
          key: llama-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('packaging/llama/manifest.json') }}
      - name: Stage pinned FFmpeg source
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build/ffmpeg/sources | Out-Null
          Invoke-WebRequest https://ffmpeg.org/releases/ffmpeg-8.1.2.tar.xz -OutFile build/ffmpeg/sources/ffmpeg-8.1.2.tar.xz
          Invoke-WebRequest https://ffmpeg.org/releases/ffmpeg-8.1.2.tar.xz.asc -OutFile build/ffmpeg/sources/ffmpeg-8.1.2.tar.xz.asc
      - name: Stage pinned llama.cpp source
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build/llama/sources | Out-Null
          Invoke-WebRequest https://github.com/ggml-org/llama.cpp/archive/aedb2a5e9ca3d4064148bbb919e0ddc0c1b70ab3.tar.gz -OutFile build/llama/sources/aedb2a5e9ca3d4064148bbb919e0ddc0c1b70ab3.tar.gz
      - name: Prepare verified FFmpeg runtime (macOS/Linux)
        if: matrix.platform != 'windows'
        run: uv run --frozen python -m build_tools.prepare_ffmpeg
      - name: Prepare verified FFmpeg runtime (Windows)
        if: matrix.platform == 'windows'
        run: >-
          uv run --frozen python -m build_tools.prepare_ffmpeg
          --gpg C:/msys64/usr/bin/gpg.exe
          --msys2-bash C:/msys64/usr/bin/bash.exe
          --cc C:/msys64/mingw64/bin/gcc.exe
          --ar C:/msys64/mingw64/bin/ar.exe
          --ranlib C:/msys64/mingw64/bin/ranlib.exe
          --strip C:/msys64/mingw64/bin/strip.exe
      - name: Prepare verified llama.cpp runtime
        run: uv run --frozen python -m build_tools.prepare_llama
      - name: Stamp unique build version
        id: build_version
        run: uv run --frozen python build_tools/release_info.py stamp --build-number ${{ github.run_number }} --github-output
      - name: Build native application
        run: uv run --frozen --extra desktop --extra build pyinstaller --noconfirm --clean packaging/am_configurator.spec
      - name: Build and test macOS DMG
        if: matrix.platform == 'macos'
        run: packaging/macos/build_dmg.sh
      - name: Build and test Windows installer
        if: matrix.platform == 'windows'
        shell: pwsh
        run: ./packaging/windows/build_installer.ps1
      - name: Build and test Linux AppImage
        if: matrix.platform == 'linux'
        run: packaging/linux/build_appimage.sh
      - name: Upload native installer
        uses: actions/upload-artifact@v4
        with:
          name: AM-Configurator-${{ steps.build_version.outputs.version }}-${{ matrix.artifact }}
          path: ${{ matrix.installer }}
          if-no-files-found: error
          retention-days: 14
