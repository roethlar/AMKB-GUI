# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Desktop installers

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  installer:
    name: Installer · ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            platform: macos
            artifact: macOS-Installer
            installer: dist/*.dmg
          - name: Windows x64
            os: windows-latest
            platform: windows
            artifact: Windows-x64-Installer
            installer: dist/*-Setup.exe
          - name: Linux x86-64
            os: ubuntu-latest
            platform: linux
            artifact: Linux-x86_64-AppImage
            installer: dist/*.AppImage
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Install uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install desktop build environment
        run: uv sync --locked --extra desktop --extra build
      - name: Install FFmpeg build prerequisites (macOS)
        if: matrix.platform == 'macos'
        run: brew install gnupg
      - name: Install FFmpeg build prerequisites (Linux)
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential zlib1g-dev gnupg xvfb xauth
      - name: Install FFmpeg build prerequisites (Windows)
        if: matrix.platform == 'windows'
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            gnupg
            make
            diffutils
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-zlib
      - name: Cache verified FFmpeg runtime
        uses: actions/cache@v4
        with:
          path: build/ffmpeg/ffmpeg-*
          key: ffmpeg-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('packaging/ffmpeg/manifest.json') }}
      - name: Stage pinned FFmpeg source
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build/ffmpeg/sources | Out-Null
          Invoke-WebRequest https://ffmpeg.org/releases/ffmpeg-8.1.2.tar.xz -OutFile build/ffmpeg/sources/ffmpeg-8.1.2.tar.xz
          Invoke-WebRequest https://ffmpeg.org/releases/ffmpeg-8.1.2.tar.xz.asc -OutFile build/ffmpeg/sources/ffmpeg-8.1.2.tar.xz.asc
      - name: Prepare verified FFmpeg runtime (macOS/Linux)
        if: matrix.platform != 'windows'
        run: uv run --frozen python -m build_tools.prepare_ffmpeg
      - name: Prepare verified FFmpeg runtime (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          MSYS2_LOCATION: ${{ steps.msys2.outputs.msys2-location }}
        run: |
          $usrBin = Join-Path $env:MSYS2_LOCATION "usr/bin"
          $mingwBin = Join-Path $env:MSYS2_LOCATION "mingw64/bin"
          $env:PATH = "$usrBin;$mingwBin;$env:PATH"
          $gpg = Join-Path $usrBin "gpg.exe"
          $bash = Join-Path $usrBin "bash.exe"
          $cc = Join-Path $mingwBin "gcc.exe"
          $ar = Join-Path $mingwBin "ar.exe"
          $ranlib = Join-Path $mingwBin "ranlib.exe"
          $strip = Join-Path $mingwBin "strip.exe"
          uv run --frozen python -m build_tools.prepare_ffmpeg `
            --gpg $gpg `
            --msys2-bash $bash `
            --cc $cc `
            --ar $ar `
            --ranlib $ranlib `
            --strip $strip
      - name: Stamp unique build version
        id: build_version
        run: uv run --frozen python build_tools/release_info.py stamp --build-number ${{ github.run_number }} --github-output
      - name: Build native application
        run: uv run --frozen --extra desktop --extra build pyinstaller --noconfirm --clean packaging/am_configurator.spec
      - name: Verify native webview policy (macos)
        if: matrix.platform == 'macos'
        run: '"dist/AM Configurator.app/Contents/MacOS/AM Configurator" --native-policy-smoke'
      - name: Verify native webview policy (windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: '& "dist/AM Configurator/AM Configurator.exe" --native-policy-smoke'
      - name: Verify native webview policy (linux)
        if: matrix.platform == 'linux'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" "dist/AM Configurator/AM Configurator" --native-policy-smoke
      - name: Build and test macOS DMG
        if: matrix.platform == 'macos'
        run: packaging/macos/build_dmg.sh
      - name: Build and test Windows installer
        if: matrix.platform == 'windows'
        shell: pwsh
        run: ./packaging/windows/build_installer.ps1
      - name: Build and test Linux AppImage
        if: matrix.platform == 'linux'
        run: packaging/linux/build_appimage.sh
      - name: Upload native installer
        uses: actions/upload-artifact@v4
        with:
          name: AM-Configurator-${{ steps.build_version.outputs.version }}-${{ matrix.artifact }}
          path: ${{ matrix.installer }}
          if-no-files-found: error
          retention-days: 14
