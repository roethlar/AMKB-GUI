# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Desktop installers

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  installer:
    name: Installer · ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            platform: macos
            artifact: macOS-Installer
            installer: dist/*.dmg
          - name: Windows x64
            os: windows-latest
            platform: windows
            artifact: Windows-x64-Installer
            installer: dist/*-Setup.exe
          - name: Linux x86-64
            os: ubuntu-latest
            platform: linux
            artifact: Linux-x86_64-AppImage
            installer: dist/*.AppImage
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - name: Install uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install desktop build environment
        run: uv sync --locked --extra desktop --extra build
      - name: Stamp unique build version
        id: build_version
        run: uv run --frozen python build_tools/release_info.py stamp --build-number ${{ github.run_number }} --github-output
      - name: Build native application
        run: uv run --frozen --extra desktop --extra build pyinstaller --noconfirm --clean packaging/am_configurator.spec
      - name: Build and test macOS DMG
        if: matrix.platform == 'macos'
        run: packaging/macos/build_dmg.sh
      - name: Build and test Windows installer
        if: matrix.platform == 'windows'
        shell: pwsh
        run: ./packaging/windows/build_installer.ps1
      - name: Build and test Linux AppImage
        if: matrix.platform == 'linux'
        run: packaging/linux/build_appimage.sh
      - name: Upload native installer
        uses: actions/upload-artifact@v4
        with:
          name: AM-Configurator-${{ steps.build_version.outputs.version }}-${{ matrix.artifact }}
          path: ${{ matrix.installer }}
          if-no-files-found: error
          retention-days: 14
