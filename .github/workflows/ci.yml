# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test · ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-latest
          - name: Linux
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install test environment
        run: uv sync --locked
      - name: Run unit tests
        run: uv run --frozen python -m unittest discover -s tests -v
      - name: Check source compilation
        run: uv run --frozen python -m compileall -q am_configurator packaging build_tools
      - name: Check browser JavaScript
        run: node --check am_configurator/web/app.js
      - name: Build Python distributions
        run: uv build
